apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: addon-operator
  namespace: openshift-addon-operator
  annotations:
    package-operator.run/phase: rbac
    package-operator.run/collision-protection: IfNoController
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: addon-operator
subjects:
- kind: ServiceAccount
  name: addon-operator
  namespace: openshift-addon-operator
